  // Build one trace per role
  const buildTraces = () => {
    if (!rows.length) return [];
    const roles = [...new Set(rows.map(r=>r.role))].sort();
    return roles.map((role,i)=>{
      const pts = rows.filter(r=>r.role===role).sort((a,b)=>a.day.localeCompare(b.day));
      return {
        name: role,
        x: pts.map(p=>p.day),
        y: pts.map(p=>p.count),
        type:'scatter', mode:'lines+markers',
        line:{color:ROLE_COLORS[i%ROLE_COLORS.length],width:2,shape:'spline'},
        marker:{size:4,color:ROLE_COLORS[i%ROLE_COLORS.length]},
        hovertemplate:`<b>${role}</b><br>%{x}<br>%{y} jobs<extra></extra>`,
      };
    });
  };

  const traces = buildTraces();
  // Compute totals per role for the bar chart
  const roleTotal = traces.map(t=>({ role:t.name, total:t.y.reduce((a,b)=>a+b,0), color:t.line.color }))
    .sort((a,b)=>b.total-a.total);

  return (
    <div className="page-content">
      {/* Controls */}
      <div className="trend-controls">
        <span style={{fontSize:12,color:'#4b6485'}}>Show last:</span>
        {[14,30,60,90].map(d=>(
          <button key={d} className={`toggle-btn ${days===d?'active':''}`} style={{padding:'5px 12px'}}
            onClick={()=>setDays(d)}>{d} days</button>
        ))}
      </div>

      {loading ? <Spinner/> : traces.length === 0 ? <Empty msg="No trend data yet. Scrape more jobs first."/> : (
        <>
          {/* Multi-line trend chart */}
          <div className="chart-card" style={{marginBottom:16}}>
            <div className="chart-head"><div className="chart-title">Job Postings Over Time — by Role</div></div>
            <PlotlyChart traces={traces} style={{width:'100%',height:'340px'}}
              layout={{
                xaxis:{title:{text:'Date',font:{size:10}}},
                yaxis:{title:{text:'Jobs posted',font:{size:10}}},
                margin:{t:20,r:20,l:50,b:50},
              }}
              deps={[ts]}/>
          </div>

          {/* Bar chart totals */}
          <div className="chart-card">
            <div className="chart-head"><div className="chart-title">Total Postings by Role (last {days} days)</div></div>
            <PlotlyChart
              traces={[{
                type:'bar', orientation:'h',
                x: roleTotal.map(r=>r.total),
                y: roleTotal.map(r=>r.role),
                marker:{color:roleTotal.map(r=>r.color)},
                hovertemplate:'<b>%{y}</b><br>%{x} jobs<extra></extra>',
              }]}
              style={{width:'100%',height:`${Math.max(180, roleTotal.length*38)}px`}}
              layout={{margin:{t:10,r:20,l:160,b:30}}}
              deps={[ts]}/>
          </div>
        </>
      )}
    </div>
  );
}

// ── Jobs Page ────────────────────────────────────────────────────────────────
function JobsPage() {
  const [roles,      setRoles]     = useState([]);
  const defaultF = { role:'', source:'', search:'', remoteOnly:false, hoursBack:720 }; // 30 days default
  const [filters,    setF]         = useState(defaultF);
  const [pending,    setPending]   = useState(defaultF);
  const [jobs,       setJobs]      = useState([]);
  const [count,      setCount]     = useState(0);
  const [page,       setPage]      = useState(0);
  const [loading,    setLoading]   = useState(false);
  const [selectedJob,  setSelectedJob]  = useState(null); // quick-look modal
  const [compareJob,   setCompareJob]   = useState(null); // resume compare modal
  const [savedJobs,    setSavedJobs]    = useState({}); // jobId → appId
  const PER_PAGE = 20;

  useEffect(()=>{ safeApi('/api/roles').then(r => { if(Array.isArray(r)) setRoles(r); }); },[]);

  const fetchJobs = useCallback((f, pg) => {
    setLoading(true);
    const ps = new URLSearchParams();
    if (f.role)       ps.set('role', f.role);
    if (f.source)     ps.set('source', f.source);
    if (f.search)     ps.set('search', f.search);
    if (f.remoteOnly) ps.set('remote_only', 'true');
    ps.set('hours_back', f.hoursBack);  // 0 = all time
    ps.set('limit', PER_PAGE);
    ps.set('offset', pg * PER_PAGE);
    Promise.all([
      api('/api/jobs?' + ps),
      api('/api/jobs/count?' + ps),
    ]).then(([j,c]) => { setJobs(j); setCount(c.count); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  useEffect(() => { fetchJobs(filters, page); }, [filters, page]);

  const apply = () => { setF({...pending}); setPage(0); };
  const clear  = () => { setPending(defaultF); setF(defaultF); setPage(0); };

  const handleSaveJob = async (e, jobId) => {
    e.stopPropagation();
    if (savedJobs[jobId]) return; // already saved
    const r = await safeApi('/api/applications', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ job_id: jobId })
    });
    if (r) setSavedJobs(prev => ({...prev, [jobId]: r.id || true}));
  };

  const totalPages = Math.ceil(count / PER_PAGE);
  const timeLabel = TIME_OPTIONS.find(t => t.hours === filters.hoursBack)?.label || `${filters.hoursBack}h`;

  return (
    <div className="page-content">
      {selectedJob && <JobDetailModal job={selectedJob} onClose={()=>setSelectedJob(null)} onCompare={j=>{ setSelectedJob(null); setCompareJob(j); }}/>}
      {compareJob  && <ResumeCompareModal job={compareJob} onClose={()=>setCompareJob(null)}/>}
      <div className="jobs-layout">
        <div className="filter-panel">
          <div className="filter-heading">🔍 Filters</div>
          <div className="filter-group">
            <label className="filter-label">Search</label>
            <input className="filter-input" placeholder="Title or company…" value={pending.search}
              onChange={e=>setPending(p=>({...p,search:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&apply()}/>
          </div>
          <div className="filter-group">
            <label className="filter-label">Role</label>
            <select className="filter-select" value={pending.role} onChange={e=>setPending(p=>({...p,role:e.target.value}))}>
              <option value="">All roles</option>
              {roles.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <div className="filter-group">
            <label className="filter-label">Source</label>
            <select className="filter-select" value={pending.source} onChange={e=>setPending(p=>({...p,source:e.target.value}))}>
              <option value="">All sources</option>
              <option value="indeed">Indeed</option>
              <option value="linkedin">LinkedIn</option>
            </select>
          </div>
          <div className="filter-group">
            <label className="filter-label">Posted within</label>
            <select className="filter-select" value={pending.hoursBack} onChange={e=>setPending(p=>({...p,hoursBack:+e.target.value}))}>
              {TIME_OPTIONS.map(t=>(
                <option key={t.hours} value={t.hours}>{t.label}</option>
              ))}
            </select>
          </div>
          <div className="filter-group">
            <label className="filter-check-wrap">
              <input type="checkbox" checked={pending.remoteOnly} onChange={e=>setPending(p=>({...p,remoteOnly:e.target.checked}))}/>
              <span>Remote only</span>
            </label>
          </div>
          <button className="btn-apply" onClick={apply}>Apply Filters</button>
          <button className="btn-clear" onClick={clear}>Clear All</button>
        </div>

        <div>
          <div className="jobs-results-bar">
            <span className="results-count">
              {count.toLocaleString()} jobs found{filters.role ? ` · ${filters.role}` : ''} · {timeLabel}
            </span>
            <span style={{fontSize:11,color:'#2d4a6a'}}>Click card to preview · 📊 to compare resume</span>
          </div>
          {loading ? <Spinner/> : jobs.length ? (
            <>
              <div className="jobs-list">
                {jobs.map((j,i) => (
                  <div className="job-card" key={i} onClick={()=>setSelectedJob(j)}>
                    <div className="job-card-top">
                      <div>
                        <div className="job-title">{j.title}</div>
                        <div className="job-company">{j.company} · <span className="job-loc">{j.location}</span></div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                        <div className="job-salary">{fmtRange(j.salary_min, j.salary_max)}</div>
                        <div style={{display:'flex',gap:5}}>
                          <button className={`save-btn ${savedJobs[j.job_id]?'saved':''}`}
                            onClick={e=>handleSaveJob(e,j.job_id)} title={savedJobs[j.job_id]?'Saved to tracker':'Save to tracker'}>
                            {savedJobs[j.job_id] ? '✅ Saved' : '💾 Save'}
                          </button>
                          <button className="compare-btn" onClick={e=>{ e.stopPropagation(); setCompareJob(j); }}>
                            📊 Compare
                          </button>
                        </div>
                      </div>
                    </div>
                    <div className="job-meta">
                      <Badge type={j.source==='indeed'?'indeed':'linkedin'}>{j.source}</Badge>
                      {j.is_remote && <Badge type="remote">Remote</Badge>}
                      {j.seniority && j.seniority!=='None' && <Badge type={j.seniority==='senior'?'senior':j.seniority==='lead'?'lead':'mid'}>{j.seniority}</Badge>}
                      {j.search_query && <span className="job-loc">{j.search_query}</span>}
                      {j.date_posted && j.date_posted!=='None' && <span className="job-loc">Posted {j.date_posted}</span>}
                    </div>
                  </div>
                ))}
              </div>
              {totalPages > 1 && (
                <div className="pagination">
                  <button className="pg-btn" disabled={page===0} onClick={()=>setPage(p=>p-1)}>← Prev</button>
                  {[...Array(Math.min(totalPages,7))].map((_,i)=>{
                    const pg = page < 4 ? i : (page > totalPages-5 ? totalPages-7+i : page-3+i);
                    if (pg < 0 || pg >= totalPages) return null;
                    return <button key={pg} className={`pg-btn ${pg===page?'active':''}`} onClick={()=>setPage(pg)}>{pg+1}</button>;
                  })}
                  <button className="pg-btn" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>Next →</button>
                </div>
              )}
            </>
          ) : <Empty msg="No jobs match your filters"/>}
        </div>
      </div>
    </div>
  );
}

// ── Resume Analysis Page ──────────────────────────────────────────────────────
function ResumePage() {
  const [tab,        setTab]        = useState('analyze'); // analyze | batch
  const [file,       setFile]       = useState(null);
  const [jobs,       setJobs]       = useState([]);
  const [selectedId, setSelectedId] = useState('');
  const [analyzing,  setAnalyzing]  = useState(false);
  const [result,     setResult]     = useState(null);
  const [error,      setError]      = useState('');
  const [drag,       setDrag]       = useState(false);
  // Batch score state
  const [batchFile,    setBatchFile]   = useState(null);
  const [batchScoring, setBatchScoring]= useState(false);
  const [batchResults, setBatchResults]= useState([]);
  const [batchError,   setBatchError]  = useState('');
  const [batchLimit,   setBatchLimit]  = useState(30);
  const batchFileRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    // Load recent jobs for selection
    safeApi('/api/jobs?limit=100&days_back=30').then(d => {
      if (Array.isArray(d)) setJobs(d);
    });
  }, []);

  const handleBatchScore = async () => {
    if (!batchFile) { setBatchError('Please upload your resume first.'); return; }
    setBatchError(''); setBatchScoring(true); setBatchResults([]);
    try {
      const fd = new FormData();
      fd.append('resume', batchFile);
      fd.append('limit', batchLimit);
      const r = await fetch('/api/resume/batch-score', { method:'POST', body:fd });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'Batch scoring failed');
      setBatchResults(j);
    } catch(e) { setBatchError(e.message); }
    finally { setBatchScoring(false); }
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDrag(false);
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  };

  const handleAnalyze = async () => {
    if (!file) { setError('Please upload your resume first.'); return; }
    if (!selectedId) { setError('Please select a job to compare against.'); return; }
    setError(''); setAnalyzing(true); setResult(null);
    try {
      const fd = new FormData();
      fd.append('resume', file);
      fd.append('job_id', selectedId);
      const r = await fetch('/api/resume/analyze', { method:'POST', body:fd });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'Analysis failed');
      setResult(j);
    } catch(e) {
      setError(e.message);
    } finally {
      setAnalyzing(false);
    }
  };

  const scoreColor = s => s >= 80 ? '#10b981' : s >= 60 ? '#f59e0b' : s >= 40 ? '#f97316' : '#ef4444';
  const scoreLabel = s => s >= 80 ? 'Strong Match' : s >= 60 ? 'Good Match' : s >= 40 ? 'Moderate Match' : 'Low Match';

  return (
    <div className="page-content">
      {/* Tab switcher */}
      <div className="tab-bar">
        <button className={`tab-btn ${tab==='analyze'?'active':''}`} onClick={()=>setTab('analyze')}>📊 Analyze vs Job</button>
        <button className={`tab-btn ${tab==='batch'?'active':''}`} onClick={()=>setTab('batch')}>🎯 Batch Score Top Jobs</button>
      </div>

      {tab === 'batch' && (
        <div>
          <div className="charts-row col-1-1" style={{alignItems:'start',marginBottom:16}}>
            <div className="chart-card">
              <div className="chart-head"><div className="chart-title">Upload Resume for Batch Scoring</div></div>
              <div className="upload-zone" onClick={()=>batchFileRef.current?.click()} style={{padding:'24px'}}>
                <div className="upload-zone-icon">{batchFile?'📄':'⬆️'}</div>
                {batchFile
                  ? <><div className="upload-zone-text" style={{color:'#a5b4fc'}}>{batchFile.name}</div><div className="upload-zone-sub">{(batchFile.size/1024).toFixed(1)} KB</div></>
                  : <><div className="upload-zone-text">Drop resume or click to browse</div><div className="upload-zone-sub">PDF or plain text</div></>
                }
                <input ref={batchFileRef} type="file" accept=".pdf,.txt" style={{display:'none'}} onChange={e=>setBatchFile(e.target.files[0])}/>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:10}}>
                <label style={{fontSize:12,color:'#64748b'}}>Score top</label>
                <select className="filter-select" style={{width:80}} value={batchLimit} onChange={e=>setBatchLimit(+e.target.value)}>
                  {[20,30,50,100].map(n=><option key={n} value={n}>{n}</option>)}
                </select>
                <label style={{fontSize:12,color:'#64748b'}}>jobs</label>
                <button className="btn-apply" style={{marginLeft:'auto',margin:0,width:'auto',padding:'8px 20px'}}
                  disabled={!batchFile||batchScoring} onClick={handleBatchScore}>
                  {batchScoring ? '⏳ Scoring…' : '🚀 Score Now'}
                </button>
              </div>
              {batchError && <div style={{color:'#f87171',fontSize:12,marginTop:8}}>⚠️ {batchError}</div>}
            </div>
            <div className="chart-card">
              <div className="chart-head"><div className="chart-title">How Batch Scoring Works</div></div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.8}}>
                <div style={{marginBottom:8}}>Batch scoring uses <strong style={{color:'#a5b4fc'}}>regex skill matching</strong> (no LLM cost) to quickly rank all your recent job postings by compatibility with your resume.</div>
                <div style={{marginBottom:6}}>• Skills are extracted from your resume using 100+ tech skill patterns</div>
                <div style={{marginBottom:6}}>• Each job is scored by % of its required skills you already have</div>
                <div style={{marginBottom:6}}>• Results are sorted highest match first</div>
                <div style={{color:'#4b6485',fontStyle:'italic',fontSize:11}}>For deep analysis of a specific job, use the "Analyze vs Job" tab with GPT-4o-mini.</div>
              </div>
            </div>
          </div>

          {batchScoring && <Spinner/>}
          {batchResults.length > 0 && (
            <div className="chart-card">
              <div className="chart-head">
                <div className="chart-title">Batch Score Results</div>
                <div style={{fontSize:11,color:'#4b6485'}}>{batchResults.length} jobs scored — sorted by match</div>
              </div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>#</th><th>Job</th><th>Company</th><th>Match</th><th>Score</th><th>Salary</th><th></th></tr></thead>
                  <tbody>
                    {batchResults.map((j,i)=>(
                      <tr key={i}>
                        <td style={{color:'#4b6485'}}>{i+1}</td>
                        <td><div className="td-bold">{j.title}</div><div style={{fontSize:11,color:'#4b6485'}}>{j.search_query}</div></td>
                        <td>{j.company}</td>
                        <td style={{minWidth:140}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div className="score-bar-wrap">
                              <div className="score-bar-fill" style={{width:`${j.match_score}%`,background:`linear-gradient(90deg,${j.match_score>=80?'#10b981':j.match_score>=60?'#f59e0b':'#ef4444'},transparent)`}}/>
                            </div>
                            <span style={{fontSize:11,color:j.match_score>=80?'#10b981':j.match_score>=60?'#f59e0b':'#f87171',fontWeight:700,width:34,textAlign:'right'}}>{j.match_score}%</span>
                          </div>
                          <div style={{fontSize:10,color:'#4b6485',marginTop:2}}>{j.matched_count}/{j.total_skills} skills</div>
                        </td>
                        <td>
                          <div className="skill-chip-wrap" style={{maxWidth:220}}>
                            {j.matched_skills.slice(0,4).map(s=><span key={s} className="skill-chip matched" style={{fontSize:9,padding:'2px 6px'}}>{s}</span>)}
                            {j.matched_skills.length>4 && <span style={{fontSize:10,color:'#4b6485'}}>+{j.matched_skills.length-4}</span>}
                          </div>
                        </td>
                        <td style={{color:'#10b981',fontWeight:600}}>{fmtRange(j.salary_min,j.salary_max)}</td>
                        <td>{j.url && <a href={j.url} target="_blank" rel="noopener noreferrer" style={{color:'#6366f1',fontSize:11}}>🔗 Apply</a>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {tab === 'analyze' && <div className="charts-row col-1-1" style={{alignItems:'start'}}>
        {/* Left: Upload + Select */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* Upload zone */}
          <div className="chart-card">
            <div className="chart-head"><div className="chart-title">1. Upload Your Resume</div></div>
            <div
              className={`upload-zone ${drag ? 'dragover' : ''}`}
              onClick={()=>fileRef.current?.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true)}}
              onDragLeave={()=>setDrag(false)}
              onDrop={handleDrop}
            >
              <div className="upload-zone-icon">{file ? '📄' : '⬆️'}</div>
              {file ? (
                <>
                  <div className="upload-zone-text" style={{color:'#a5b4fc'}}>{file.name}</div>
                  <div className="upload-zone-sub">{(file.size/1024).toFixed(1)} KB · Click to change</div>
                </>
              ) : (
                <>
                  <div className="upload-zone-text">Drop your resume here</div>
                  <div className="upload-zone-sub">PDF or plain text (.txt) · Click to browse</div>
                </>
              )}
              <input ref={fileRef} type="file" accept=".pdf,.txt,.doc,.docx" style={{display:'none'}}
                onChange={e=>setFile(e.target.files[0])}/>
            </div>
          </div>

          {/* Job selector */}
          <div className="chart-card">
            <div className="chart-head"><div className="chart-title">2. Select a Job to Compare</div></div>
            <select className="filter-select" style={{marginBottom:10}} value={selectedId}
              onChange={e=>setSelectedId(e.target.value)}>
              <option value="">— Choose a job posting —</option>
              {jobs.map((j,i)=>(
                <option key={i} value={j.job_id||i}>
                  {j.title} @ {j.company} {j.location ? `(${j.location})` : ''}
                </option>
              ))}
            </select>
            {selectedId && jobs.find(j=>String(j.job_id)===selectedId || String(jobs.indexOf(j))===selectedId) && (() => {
              const j = jobs.find(j=>String(j.job_id)===selectedId) || jobs[+selectedId];
              return j ? (
                <div style={{fontSize:11,color:'#4b6485',marginTop:4}}>
                  {j.source && <Badge type={j.source==='indeed'?'indeed':'linkedin'}>{j.source}</Badge>}
                  {' '}{j.is_remote ? '🌐 Remote' : j.location}
                  {j.salary_min ? ' · ' + fmtRange(j.salary_min, j.salary_max) : ''}
                </div>
              ) : null;
            })()}
            {error && <div style={{color:'#f87171',fontSize:12,marginTop:8}}>⚠️ {error}</div>}
            <button className="btn-apply" style={{marginTop:12}} disabled={analyzing} onClick={handleAnalyze}>
              {analyzing ? '🔍 Analyzing…' : '🚀 Analyze Resume'}
            </button>
          </div>
        </div>

        {/* Right: Results */}
        <div className="chart-card" style={{minHeight:300}}>
          <div className="chart-head"><div className="chart-title">3. Analysis Results</div></div>
          {analyzing && <Spinner/>}
          {!analyzing && !result && (
            <Empty msg="Upload your resume and select a job to see the analysis"/>
          )}
          {result && (
            <div>
              {/* Score */}
              <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:18,padding:'14px 16px',background:'rgba(13,21,38,.6)',borderRadius:10,border:'1px solid rgba(99,102,241,.12)'}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:42,fontWeight:800,color:scoreColor(result.match_score),lineHeight:1}}>{result.match_score}%</div>
                  <div style={{fontSize:11,color:'#4b6485',marginTop:2}}>Match Score</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:16,fontWeight:700,color:scoreColor(result.match_score),marginBottom:4}}>{scoreLabel(result.match_score)}</div>
                  {result.job_info?.title && (
                    <div style={{fontSize:12,color:'#94a3b8'}}>vs. <strong>{result.job_info.title}</strong>{result.job_info.company ? ` @ ${result.job_info.company}` : ''}</div>
                  )}
                  <div className="progress-bar-wrap" style={{marginTop:8}}>
                    <div className="progress-bar-fill" style={{width:`${result.match_score}%`,background:`linear-gradient(90deg,${scoreColor(result.match_score)},${scoreColor(result.match_score)}aa)`}}/>
                  </div>
                </div>
              </div>

              {/* Matched skills */}
              {result.matched_skills?.length > 0 && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#34d399',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>
                    ✅ Matched Skills ({result.matched_skills.length})
                  </div>
                  <div className="skill-chip-wrap">
                    {result.matched_skills.map(s=><span key={s} className="skill-chip matched">{s}</span>)}
                  </div>
                </div>
              )}

              {/* Missing skills */}
              {result.missing_skills?.length > 0 && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#f87171',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>
                    ❌ Skills to Develop ({result.missing_skills.length})
                  </div>
                  <div className="skill-chip-wrap">
                    {result.missing_skills.map(s=><span key={s} className="skill-chip missing">{s}</span>)}
                  </div>
                </div>
              )}

              {/* Your extra skills */}
              {result.extra_skills?.length > 0 && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#a5b4fc',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>
                    ⭐ Your Additional Skills ({result.extra_skills.length})
                  </div>
                  <div className="skill-chip-wrap">
                    {result.extra_skills.map(s=><span key={s} className="skill-chip extra">{s}</span>)}
                  </div>
                </div>
              )}

              {/* Suggestions */}
              {result.suggestions?.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>💡 Suggestions</div>
                  {result.suggestions.map((s,i)=>(
                    <div key={i} className="suggestion-box">{s}</div>
                  ))}
                </div>
              )}

              {/* Note if no job skills found */}
              {result.job_skills?.length === 0 && (
                <div className="suggestion-box" style={{borderColor:'rgba(245,158,11,.3)',color:'#fbbf24'}}>
                  💡 No skills were extracted from this job posting. Try running "Extract Skills" from the Skills page first, or the job description may not be stored in the database.
                </div>
              )}
            </div>
          )}
        </div>
      </div>}
    </div>
  );
}

// ── Log Viewer Component ─────────────────────────────────────────────────────
function LogViewer({ running }) {
  const [lines, setLines]       = useState([]);
  const [logFile, setLogFile]   = useState('');
  const [autoScroll, setAuto]   = useState(true);
  const [paused, setPaused]     = useState(false);
  const bodyRef                 = useRef(null);

  const fetchLogs = useCallback(() => {
    if (paused) return;
    api('/api/pipeline/logs?lines=300')
      .then(r => { setLines(r.lines || []); setLogFile(r.file || ''); })
      .catch(() => {});
  }, [paused]);

  useEffect(() => {
    fetchLogs();
    const iv = setInterval(fetchLogs, running ? 2000 : 10000);
    return () => clearInterval(iv);
  }, [running, fetchLogs]);

  useEffect(() => {
    if (autoScroll && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [lines, autoScroll]);

  const classifyLine = (line) => {
    const l = line.toLowerCase();
    if (l.includes('error') || l.includes('failed') || l.includes('captcha') || l.includes('bot detection')) return 'error';
    if (l.includes('warn'))   return 'warn';
    if (l.includes('✅') || l.includes('complete') || l.includes('pipeline complete')) return 'success';
    if (l.includes('🚀') || l.includes('pipeline run') || l.includes('scraping') || l.includes('etl')) return 'highlight';
    return 'info';
  };

  return (
    <div className="log-viewer">
      <div className="log-header">
        <div className="log-title">
          <div className={`log-live-dot ${running ? '' : 'inactive'}`} style={running ? {animation:'pulse 1.2s ease-in-out infinite'} : {}}/>
          {running ? 'Live Output' : 'Log Viewer'} {logFile && <span style={{color:'#2d4a6a',fontWeight:400}}>— {logFile}</span>}
        </div>
        <div className="log-actions">
          <button className="log-btn" onClick={()=>setAuto(a=>!a)}>{autoScroll ? '📌 Auto-scroll ON' : '📌 Auto-scroll OFF'}</button>
          <button className="log-btn" onClick={()=>setPaused(p=>!p)}>{paused ? '▶ Resume' : '⏸ Pause'}</button>
          <button className="log-btn" onClick={fetchLogs}>↻ Refresh</button>
          <button className="log-btn" onClick={()=>setLines([])}>✕ Clear</button>
        </div>
      </div>
      <div className="log-body" ref={bodyRef} onScroll={e => {
        const el = e.target;
        const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
        if (!atBottom && autoScroll) setAuto(false);
        if (atBottom && !autoScroll) setAuto(true);
      }}>
        {lines.length === 0 ? (
          <div className="log-empty">
            <div className="log-empty-icon">📄</div>
            <div style={{fontSize:12}}>No log output yet. Run the pipeline to see live output here.</div>
          </div>
        ) : lines.map((line, i) => (
          <div key={i} className={`log-line ${classifyLine(line)}`}>{line || '\u00A0'}</div>
        ))}
      </div>
    </div>
  );
}

// ── Pipeline Page ────────────────────────────────────────────────────────────
function PipelinePage() {
  const [dbStats,      setDbStats]     = useState(null);
  const [history,      setHistory]     = useState([]);
  const [running,      setRunning]     = useState(false);
  const [message,      setMessage]     = useState('');
  const [ts,           setTs]          = useState(0);
  const [config,       setConfig]      = useState(null);
  const configRef = React.useRef(null);
  const setConfigAndRef = (cfg) => { configRef.current = cfg; setConfig(cfg); };
  const [newRole,      setNewRole]     = useState('');
  const [newLoc,       setNewLoc]      = useState('');
  const [cfgSaved,     setCfgSaved]    = useState('');
  const [apiKey,       setApiKey]      = useState('');
  const [keySaved,     setKeySaved]    = useState('');
  const [keySet,       setKeySet]      = useState(false);
  const [dupCount,      setDupCount]     = useState(null);
  const [dedupRunning,  setDedupRunning] = useState(false);
  const [dedupMsg,      setDedupMsg]     = useState('');
  const [schedStatus,   setSchedStatus]  = useState(null);

  const loadData = () => {
    Promise.all([
      safeApi('/api/db-stats'),
      safeApi('/api/scrape-history'),
      safeApi('/api/pipeline/status'),
      safeApi('/api/config'),
    ]).then(([db, hist, status, cfg]) => {
      if(db) setDbStats(db);
      if(Array.isArray(hist)) setHistory(hist);
      if(status) { setRunning(status.running); setSchedStatus(status); }
      if(cfg) { setConfigAndRef(cfg); setKeySet(cfg.openai_key_set || false); }
      setTs(Date.now());
    });
  };

  useEffect(() => {
    loadData();
    const iv = setInterval(() => {
      safeApi('/api/pipeline/status').then(s => {
        if (!s) return;
        const wasRunning = running;
        setRunning(s.running);
        setSchedStatus(s);
        if (wasRunning && !s.running) loadData();
      });
    }, 3000);
    return () => clearInterval(iv);
  }, []);

  const handleRun = async () => {
    setMessage('');
    try {
      const r = await fetch('/api/pipeline/run', { method: 'POST' });
      const j = await r.json();
      if (j.status === 'started') {
        setRunning(true);
        setMessage('✅ Pipeline started! Watch the log output below.');
      } else {
        setMessage('⚠️ ' + (j.message || j.status));
      }
    } catch(e) { setMessage('❌ Error: ' + e.message); }
  };

  const addRole = async () => {
    if (!newRole.trim() || !configRef.current) return;
    const cur      = configRef.current;
    const incoming = newRole.split(',').map(r => r.trim()).filter(r => r.length > 0);
    const existing = cur.roles || [];
    const merged   = [...existing, ...incoming.filter(r => !existing.includes(r))];
    const updated  = { ...cur, roles: merged };
    const res = await safeApi('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated) });
    if (res && res.status === 'saved') {
      setConfigAndRef(updated); setNewRole('');
      setCfgSaved(`${incoming.length > 1 ? incoming.length + ' roles' : '1 role'} added!`);
    } else {
      setCfgSaved('❌ Failed to save — check file permissions on server');
    }
    setTimeout(()=>setCfgSaved(''),3000);
  };

  const removeRole = async (role) => {
    if (!configRef.current) return;
    const cur     = configRef.current;
    const updated = { ...cur, roles: cur.roles.filter(r => r !== role) };
    setConfigAndRef(updated); // update UI immediately
    const res = await safeApi('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated) });
    if (res && res.status === 'saved') {
      setCfgSaved('Role removed!');
    } else {
      setConfigAndRef(cur); // revert on failure
      setCfgSaved('❌ Failed to save — check file permissions on server');
    }
    setTimeout(()=>setCfgSaved(''),3000);
  };

  const toggleSchedule = async () => {
    if (!config) return;
    const updated = { ...config, schedule_enabled: !config.schedule_enabled };
    await safeApi('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated) });
    setConfig(updated); setCfgSaved('Schedule updated!');
    setTimeout(()=>setCfgSaved(''),2000);
  };

  const updateInterval = async (hours) => {
    if (!config) return;
    const updated = { ...config, schedule_interval_hours: hours };
    await safeApi('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated) });
    setConfig(updated); setCfgSaved('Interval saved!');
    setTimeout(()=>setCfgSaved(''),2000);
  };

  const addLocation = async () => {
    if (!newLoc.trim() || !config) return;
    const locs = config.priority_locations || [];
    if (locs.includes(newLoc.trim())) { setNewLoc(''); return; }
    const updated = { ...config, priority_locations: [...locs, newLoc.trim()] };
    await safeApi('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated) });
    setConfig(updated); setNewLoc(''); setCfgSaved('Location added!');
    setTimeout(()=>setCfgSaved(''),2000);
  };

  const removeLocation = async (loc) => {
    if (!config) return;
    const updated = { ...config, priority_locations: (config.priority_locations||[]).filter(l => l !== loc) };
    await safeApi('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated) });
    setConfig(updated); setCfgSaved('Location removed!');
    setTimeout(()=>setCfgSaved(''),2000);
  };

  const saveApiKey = async () => {
    if (!apiKey.trim()) return;
    const r = await safeApi('/api/config/openai-key', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ key: apiKey.trim() })
    });
    if (r?.status === 'saved') {
      setKeySet(true); setApiKey(''); setKeySaved('✅ API key saved!');
      setTimeout(()=>setKeySaved(''),3000);
    }
  };

  const loadDupCount = () => {
    safeApi('/api/jobs/duplicate-count').then(d => { if(d) setDupCount(d.count); });
  };
  useEffect(loadDupCount, []);

  const handleDeduplicate = async () => {
    if (!window.confirm(`Remove duplicate job postings? This will mark older duplicates as inactive. You can still view them using "All time" filter.`)) return;
    setDedupRunning(true); setDedupMsg('');
    const r = await safeApi('/api/jobs/deduplicate', { method:'POST' });
    if (r) { setDedupMsg(`✅ Done — removed ${r.removed} duplicate(s).`); setDupCount(0); }
    else setDedupMsg('❌ Deduplication failed.');
    setDedupRunning(false);
    setTimeout(()=>setDedupMsg(''),5000);
  };

  const histTraces = history.length ? (() => {
    const success = history.filter(h => h.status === 'success').length;
    const failed  = history.filter(h => h.status === 'failed').length;
    return [{
      type:'bar', x:['Success','Failed'], y:[success, failed],
      marker:{color:['#10b981','#ef4444']},
      hovertemplate:'%{x}: %{y}<extra></extra>',
    }];
  })() : [];

  return (
    <div className="page-content">
      <div className="stats-row stats-4">
        <StatCard label="Total Jobs"    value={dbStats?.total_jobs?.toLocaleString()} icon="📋" gradient="linear-gradient(90deg,#6366f1,#818cf8)"/>
        <StatCard label="Skills Tagged" value={dbStats?.total_skills?.toLocaleString()} icon="🏷️" gradient="linear-gradient(90deg,#22d3ee,#67e8f9)"/>
        <StatCard label="Scrape Runs"   value={dbStats?.total_runs} icon="🔄" gradient="linear-gradient(90deg,#10b981,#34d399)"/>
        <StatCard label="Failed Runs"   value={dbStats?.failed_runs} icon="⚠️" gradient="linear-gradient(90deg,#ef4444,#f87171)"/>
      </div>

      {/* Deduplication */}
      <div className="chart-card" style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div className="chart-title">🔁 Job Deduplication</div>
          <div className="chart-sub" style={{marginTop:4}}>
            {dupCount === null ? 'Checking for duplicates…'
              : dupCount === 0 ? '✅ No duplicate jobs found'
              : `⚠️ ${dupCount} duplicate posting${dupCount!==1?'s':''} detected (same title + company within 7 days)`}
          </div>
          {dedupMsg && <div style={{fontSize:12,marginTop:6,color: dedupMsg.startsWith('✅')?'#34d399':'#f87171'}}>{dedupMsg}</div>}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn-ghost" onClick={loadDupCount}>↻ Recheck</button>
          {dupCount > 0 && (
            <button className="run-btn" style={{padding:'9px 18px',fontSize:13,boxShadow:'none'}} disabled={dedupRunning} onClick={handleDeduplicate}>
              {dedupRunning ? '⏳ Running…' : '🧹 Remove Duplicates'}
            </button>
          )}
        </div>
      </div>

      {/* Run control */}
      <div className="run-section">
        <div className="run-info">
          <div className="run-title">
            {running ? <span className="pulse">🟢 Pipeline is running…</span> : '⚡ Run Scrape Pipeline'}
          </div>
          <div className="run-sub">
            {running
              ? 'Scraping Indeed + LinkedIn in background. Live output shown below.'
              : 'Triggers a full scrape of Indeed + LinkedIn for all configured roles & locations.'}
          </div>
          {message && <div style={{marginTop:8,fontSize:12,color:'#94a3b8'}}>{message}</div>}
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <button className={`run-btn ${running ? 'is-running' : ''}`} disabled={running} onClick={handleRun}>
            {running ? '⏳ Running…' : '▶ Run Now'}
          </button>
          <button className="btn-ghost" onClick={loadData}>↻ Refresh</button>
        </div>
      </div>

      {/* OpenAI API Key + Location Priority */}
      <div className="charts-row col-1-1" style={{marginBottom:16}}>
        {/* OpenAI Key */}
        <div className="chart-card">
          <div className="chart-head">
            <div><div className="chart-title">✨ OpenAI API Key</div><div className="chart-sub">Enables AI-powered resume analysis & cover letters</div></div>
            {keySaved && <span style={{fontSize:11,color:'#34d399'}}>{keySaved}</span>}
          </div>
          <div style={{marginBottom:10}}>
            {keySet
              ? <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,marginBottom:10}}>
                  <span style={{fontSize:13}}>✅</span>
                  <span style={{fontSize:12,color:'#34d399'}}>API key is set — AI analysis is active</span>
                  <button className="log-btn" style={{marginLeft:'auto'}} onClick={()=>{setKeySet(false);setApiKey('');}}>Change</button>
                </div>
              : <div style={{fontSize:12,color:'#94a3b8',marginBottom:10,lineHeight:1.6}}>
                  Enter your OpenAI API key to unlock GPT-4o-mini resume comparison, gap analysis, interview tips, and cover letter generation.
                  Get a key at <span style={{color:'#a5b4fc'}}>platform.openai.com</span>
                </div>
            }
            {!keySet && (
              <div className="api-key-row">
                <input className="api-key-input" type="password" placeholder="sk-proj-..."
                  value={apiKey} onChange={e=>setApiKey(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&saveApiKey()}/>
                <button className="btn-save" onClick={saveApiKey} disabled={!apiKey.trim()}>Save Key</button>
              </div>
            )}
          </div>
          <div style={{fontSize:11,color:'#2d4a6a',borderTop:'1px solid rgba(99,102,241,.08)',paddingTop:10}}>
            Your key is stored locally on your server in <code style={{color:'#4b6485'}}>scrape_config.json</code> and never sent to any third party.
          </div>
        </div>

        {/* Priority Locations */}
        <div className="chart-card">
          <div className="chart-head">
            <div><div className="chart-title">📍 Priority Scrape Locations</div><div className="chart-sub">Big-market states scraped first — drag to reorder</div></div>
            {cfgSaved && cfgSaved.includes('ocation') && <span style={{fontSize:11,color:'#34d399'}}>{cfgSaved}</span>}
          </div>
          {config ? (
            <>
              <div style={{display:'flex',flexWrap:'wrap',marginBottom:4,maxHeight:160,overflowY:'auto'}}>
                {(config.priority_locations||[]).map((loc,idx)=>(
                  <div key={loc} className="role-chip" style={{background:'rgba(34,211,238,.08)',borderColor:'rgba(34,211,238,.2)',color:'#67e8f9'}}>
                    <span style={{fontSize:10,color:'#2d4a6a',marginRight:2}}>{idx+1}</span>
                    <span>{loc}</span>
                    <button className="role-chip-del" onClick={()=>removeLocation(loc)}>×</button>
                  </div>
                ))}
              </div>
              <div className="role-add-row">
                <input className="role-add-input" placeholder="Add location (e.g. Austin, TX)…"
                  value={newLoc} onChange={e=>setNewLoc(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addLocation()}/>
                <button className="btn-add" onClick={addLocation}>+ Add</button>
              </div>
              <div style={{fontSize:11,color:'#2d4a6a',marginTop:8}}>
                The scraper will target these markets in order — highest-density tech markets listed first by default.
              </div>
            </>
          ) : <Spinner/>}
        </div>
      </div>

      {/* Role Manager + Scheduler side by side */}
      <div className="charts-row col-1-1" style={{marginBottom:16}}>
        {/* Role Manager */}
        <div className="chart-card">
          <div className="chart-head">
            <div><div className="chart-title">Job Roles to Scrape</div><div className="chart-sub">Roles scraped in every pipeline run</div></div>
            {cfgSaved && <span style={{fontSize:11,color:'#34d399'}}>{cfgSaved}</span>}
          </div>
          {config ? (
            <>
              <div style={{display:'flex',flexWrap:'wrap',marginBottom:4}}>
                {(config.roles||[]).map(r=>(
                  <div key={r} className="role-chip">
                    <span>{r}</span>
                    <button className="role-chip-del" onClick={()=>removeRole(r)} title="Remove">×</button>
                  </div>
                ))}
              </div>
              <div className="role-add-row">
                <input
                  className="role-add-input"
                  placeholder="e.g. Analytics Engineer, MLOps Engineer, Data Engineer…"
                  value={newRole}
                  onChange={e=>setNewRole(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addRole()}
                />
                <button className="btn-add" onClick={addRole}>+ Add</button>
              </div>
              <div style={{fontSize:11,color:'#2d4a6a',marginTop:8}}>
                Tip: Enter multiple roles separated by commas to add them all at once. Changes take effect on the next pipeline run.
              </div>
            </>
          ) : <Spinner/>}
        </div>

        {/* Scheduler */}
        <div className="chart-card">
          <div className="chart-head">
            <div><div className="chart-title">Auto-Schedule</div><div className="chart-sub">Configure automatic scraping intervals</div></div>
          </div>
          {config ? (
            <>
              <div className="schedule-card" style={{marginBottom:12}}>
                <div className="schedule-row">
                  <div>
                    <div style={{fontSize:13,color:'#e2e8f0',fontWeight:500}}>Automatic Scraping</div>
                    <div style={{fontSize:11,color:'#4b6485',marginTop:2}}>Run pipeline automatically on schedule</div>
                  </div>
                  <div className="switch-wrap">
                    <div className={`switch ${config.schedule_enabled ? 'on' : ''}`} onClick={toggleSchedule}>
                      <div className="switch-knob"/>
                    </div>
                    <span className="switch-label">{config.schedule_enabled ? 'Enabled' : 'Disabled'}</span>
                  </div>
                </div>
              </div>
              <div className="filter-group">
                <label className="filter-label">Run every</label>
                <select
                  className="filter-select"
                  value={config.schedule_interval_hours}
                  onChange={e=>updateInterval(+e.target.value)}
                  disabled={!config.schedule_enabled}
                >
                  <option value={1}>1 hour</option>
                  <option value={3}>3 hours</option>
                  <option value={6}>6 hours</option>
                  <option value={12}>12 hours</option>
                  <option value={24}>24 hours (daily)</option>
                  <option value={48}>48 hours</option>
                  <option value={168}>7 days (weekly)</option>
                </select>
              </div>
              {config.schedule_enabled && (
                <div style={{background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'#34d399',marginTop:8}}>
                  ✅ Scheduler active — runs every {config.schedule_interval_hours}h.
                  {schedStatus && schedStatus.next_auto_run && (
                    <span> Next run: <strong>{schedStatus.next_auto_run}</strong>
                      {schedStatus.hours_until_next_run !== null && schedStatus.hours_until_next_run !== undefined &&
                        <span style={{color:'#6ee7b7'}}> ({schedStatus.hours_until_next_run < 1
                          ? `${Math.round(schedStatus.hours_until_next_run * 60)} min`
                          : `${schedStatus.hours_until_next_run.toFixed(1)}h`} from now)</span>
                      }
                    </span>
                  )}
                  {schedStatus && schedStatus.last_auto_run && (
                    <div style={{marginTop:4,color:'#a7f3d0'}}>Last auto-run: {schedStatus.last_auto_run}</div>
                  )}
                </div>
              )}
              {!config.schedule_enabled && (
                <div style={{background:'rgba(71,85,105,.1)',border:'1px solid rgba(71,85,105,.2)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'#64748b',marginTop:8}}>
                  Enable auto-schedule to run the scraper automatically. No separate process needed — the API handles it automatically.
                </div>
              )}
            </>
          ) : <Spinner/>}
        </div>
      </div>

      {/* Live log output */}
      <LogViewer running={running}/>

      <div className="charts-row col-2-1" style={{marginTop:16}}>
        <div className="chart-card">
          <div className="chart-head"><div className="chart-title">Scrape History</div></div>
          {history.length ? (
            <div className="tbl-wrap" style={{maxHeight:320,overflowY:'auto'}}>
              <table>
                <thead><tr><th>Date</th><th>Time</th><th>Source</th><th>Role</th><th>Location</th><th>Found</th><th>New</th><th>Status</th></tr></thead>
                <tbody>
                  {history.map((h,i) => (
                    <tr key={i}>
                      <td>{h.date}</td>
                      <td style={{color:'#4b6485'}}>{h.time}</td>
                      <td><Badge type={h.source==='indeed'?'indeed':'linkedin'}>{h.source||'—'}</Badge></td>
                      <td className="td-bold">{h.query||'—'}</td>
                      <td style={{color:'#4b6485'}}>{h.location||'—'}</td>
                      <td>{h.jobs_found}</td>
                      <td className="td-green">{h.jobs_new}</td>
                      <td><Badge type={h.status==='success'?'success':h.status==='running'?'running':'failed'}>{h.status}</Badge></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : <Empty msg="No scrape history yet"/>}
        </div>
        <div className="chart-card">
          <div className="chart-head"><div className="chart-title">Run Outcomes</div></div>
          {histTraces.length ? (
            <PlotlyChart traces={histTraces} style={{width:'100%',height:'220px'}}
              layout={{margin:{t:10,r:14,l:40,b:40},showlegend:false,yaxis:{dtick:1}}}
              deps={[ts]}/>
          ) : <Empty msg="No run data yet"/>}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
const PAGE_META = {
  overview:     { title:'Overview',            subtitle:'Real-time job market intelligence' },
  map:          { title:'USA Map',             subtitle:'Geographic distribution of jobs across all 50 states' },
  salary:       { title:'Salary Intelligence', subtitle:'Compensation analysis across roles and seniority' },
  skills:       { title:'Skills Demand',       subtitle:'Most in-demand skills extracted from job descriptions' },
  jobs:         { title:'Job Explorer',        subtitle:'Browse, filter, and preview all scraped job postings' },
  resume:       { title:'Resume Match',        subtitle:'Upload your resume and compare it against job postings with AI' },
  applications: { title:'My Applications',     subtitle:'Track your job applications through the hiring pipeline' },
  trends:       { title:'Market Trends',       subtitle:'Job posting trends over time by role' },
  pipeline:     { title:'Pipeline Control',    subtitle:'Manage roles, scheduling, and monitor data ingestion' },
};

function App() {
  const [page, setPage] = useState('overview');
  const meta = PAGE_META[page] || {};

  const PageComponent = {
    overview:     OverviewPage,
    map:          MapPage,
    salary:       SalaryPage,
    skills:       SkillsPage,
    jobs:         JobsPage,
    resume:       ResumePage,
    applications: MyApplicationsPage,
    trends:       MarketTrendsPage,
    pipeline:     PipelinePage,
  }[page];

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage}/>
      <main className="main">
        <div className="page-header">
          <div className="page-titles">
            <div className="page-title">{meta.title}</div>
            <div className="page-subtitle">{meta.subtitle}</div>
          </div>
        </div>
        {PageComponent && <PageComponent key={page}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
